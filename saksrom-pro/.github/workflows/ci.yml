name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [ai-engine, backend-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        working-directory: source_code/${{ matrix.project }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        working-directory: source_code/${{ matrix.project }}
        run: pytest

  desktop-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: source_code/desktop-tauri
        run: npm install
      - name: Typecheck/build frontend
        working-directory: source_code/desktop-tauri
        run: npm run build
