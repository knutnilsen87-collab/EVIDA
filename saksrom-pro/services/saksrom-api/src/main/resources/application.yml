server:
  port: ${SAKSROM_API_PORT:8080}

spring:
  application:
    name: saksrom-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/saksrom}
    username: ${DATABASE_USER:saksrom}
    password: ${DATABASE_PASSWORD:saksrom_dev_password}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: when_authorized

saksrom:
  security:
    local-dev-mode: ${SAKSROM_LOCAL_DEV_MODE:true}
  ai:
    provider-calls-enabled: ${SAKSROM_AI_PROVIDER_CALLS_ENABLED:false}
  documents:
    raw-upload-allowed: ${SAKSROM_RAW_DOCUMENT_UPLOAD_ALLOWED:false}
