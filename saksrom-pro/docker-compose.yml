services:
  postgres:
    image: postgres:16
    container_name: saksrom-postgres
    environment:
      POSTGRES_DB: saksrom
      POSTGRES_USER: saksrom
      POSTGRES_PASSWORD: saksrom_dev_password
    ports:
      - "5432:5432"
    volumes:
      - saksrom_postgres:/var/lib/postgresql/data

volumes:
  saksrom_postgres:
