name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-ai-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        working-directory: evida-core/ai-engine
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        working-directory: evida-core/ai-engine
        run: pytest

  desktop-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: evida-core/desktop-tauri/package-lock.json
      - name: Install
        working-directory: evida-core/desktop-tauri
        run: npm ci
      - name: Build frontend
        working-directory: evida-core/desktop-tauri
        run: npm run build

  rust-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo check
        working-directory: evida-core/desktop-tauri/src-tauri
        run: cargo check --locked
      - name: Cargo test
        working-directory: evida-core/desktop-tauri/src-tauri
        run: cargo test --locked

  spring-boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test
        working-directory: evida-core/services/saksrom-api
        run: mvn test

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
